<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDo List - Тёмно-фиолетовая тема</title>
    <link rel="stylesheet" href="/src/style.css">
</head>
<body>
    <div class="container">
        <h1>🎯 ToDo List</h1>
        <div class="subtitle">Управляй своими задачами стильно</div>
        
        <div class="add-section">
            <input type="text" id="todoInput" placeholder="Что нужно сделать?">
            <button id="addBtn">➕ Добавить</button>
        </div>

        <div class="filters">
            <button class="filter-btn active" data-filter="all">📋 Все</button>
            <button class="filter-btn" data-filter="active">🔄 Активные</button>
            <button class="filter-btn" data-filter="completed">✅ Выполненные</button>
        </div>

        <div class="stats">
            📊 Всего: <span id="totalCount">0</span> &nbsp;|&nbsp;
            ⏳ Активных: <span id="activeCount">0</span> &nbsp;|&nbsp;
            ✔️ Выполненных: <span id="completedCount">0</span>
        </div>

        <div id="todoList"></div>
    </div>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
